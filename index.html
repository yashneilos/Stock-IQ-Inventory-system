<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockIQ — Inventory Management System</title>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX transpilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { font-family: 'Inter', sans-serif; overflow: hidden; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0d0f1a; color: #fff; gap: 16px; z-index: 9999;
      font-family: 'Inter', sans-serif;
    }
    .load-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 8px;
      box-shadow: 0 0 32px rgba(99,102,241,0.5);
    }
    .load-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .load-sub   { font-size: 13px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; }
    .load-bar   {
      width: 200px; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden; margin-top: 8px;
    }
    .load-fill  {
      height: 100%; width: 0%; border-radius: 2px;
      background: linear-gradient(90deg, #6366f1, #7c3aed);
      animation: loadprog 1.8s ease-in-out forwards;
    }
    @keyframes loadprog {
      0%   { width: 0% }
      60%  { width: 80% }
      100% { width: 100% }
    }
  </style>
  <!-- Extracted stylesheet -->
</head>
<body>

  <!-- Loading splash -->
  <div id="loading">
    <div class="load-logo">⚡</div>
    <div class="load-title">StockIQ Enterprise</div>
    <div class="load-sub">Initialising v3.2 · Please wait…</div>
    <div class="load-bar"><div class="load-fill"></div></div>
  </div>

  <div id="root"></div>

<script type="text/babel" src="inventory-system.jsx"></script>
</body>
</html>
